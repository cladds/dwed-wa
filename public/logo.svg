<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer ring - dodecagon for mechanical feel -->
  <polygon points="32,2 44.5,5.5 54,13 60,25.5 60,38.5 54,51 44.5,58.5 32,62 19.5,58.5 10,51 4,38.5 4,25.5 10,13 19.5,5.5" fill="none" stroke="#c4923a" stroke-width="2" stroke-linejoin="miter"/>
  <!-- Inner ring -->
  <polygon points="32,11 40.5,14 47,20 52,29 52,35 47,44 40.5,50 32,53 23.5,50 17,44 12,35 12,29 17,20 23.5,14" fill="none" stroke="#c4923a" stroke-width="1.5" stroke-linejoin="miter"/>
  <!-- 8 Spokes as sharp lines -->
  <!-- Cardinal spokes -->
  <line x1="32" y1="3" x2="32" y2="22" stroke="#c4923a" stroke-width="2.5"/>
  <line x1="32" y1="42" x2="32" y2="61" stroke="#c4923a" stroke-width="2.5"/>
  <line x1="3" y1="32" x2="22" y2="32" stroke="#c4923a" stroke-width="2.5"/>
  <line x1="42" y1="32" x2="61" y2="32" stroke="#c4923a" stroke-width="2.5"/>
  <!-- Diagonal spokes -->
  <line x1="11.5" y1="11.5" x2="24.5" y2="24.5" stroke="#c4923a" stroke-width="2"/>
  <line x1="52.5" y1="11.5" x2="39.5" y2="24.5" stroke="#c4923a" stroke-width="2"/>
  <line x1="11.5" y1="52.5" x2="24.5" y2="39.5" stroke="#c4923a" stroke-width="2"/>
  <line x1="52.5" y1="52.5" x2="39.5" y2="39.5" stroke="#c4923a" stroke-width="2"/>
  <!-- Center hub - octagon -->
  <polygon points="32,22 39,25 42,32 39,39 32,42 25,39 22,32 25,25" fill="none" stroke="#c4923a" stroke-width="2" stroke-linejoin="miter"/>
  <!-- Center point - diamond -->
  <polygon points="32,28 36,32 32,36 28,32" fill="#c4923a"/>
  <!-- Outer notch marks between spokes for gear/mechanical feel -->
  <line x1="21" y1="4.5" x2="23" y2="8" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="43" y1="4.5" x2="41" y2="8" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="59.5" y1="21" x2="56" y2="23" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="59.5" y1="43" x2="56" y2="41" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="43" y1="59.5" x2="41" y2="56" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="21" y1="59.5" x2="23" y2="56" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="4.5" y1="43" x2="8" y2="41" stroke="#c4923a" stroke-width="1.5"/>
  <line x1="4.5" y1="21" x2="8" y2="23" stroke="#c4923a" stroke-width="1.5"/>
</svg>